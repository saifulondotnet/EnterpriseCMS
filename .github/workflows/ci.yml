name: CI

on:
  push:
    branches: [ main, develop, "feature/**" ]
  pull_request:
    branches: [ main, develop ]

env:
  DOTNET_VERSION: '9.0.x'
  BUILD_CONFIGURATION: Release

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore src/EnterpriseCMS.Web/EnterpriseCMS.Web.csproj

      - name: Build
        run: dotnet build src/EnterpriseCMS.Web/EnterpriseCMS.Web.csproj --no-restore -c ${{ env.BUILD_CONFIGURATION }}

      - name: Run unit tests
        run: dotnet test tests/EnterpriseCMS.UnitTests/EnterpriseCMS.UnitTests.csproj --no-build -c ${{ env.BUILD_CONFIGURATION }} --logger trx --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Vulnerability scan
        run: dotnet list src/EnterpriseCMS.Web/EnterpriseCMS.Web.csproj package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt; echo "Scan complete"

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vulnerability-report
          path: vuln-report.txt

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/EnterpriseCMS.Web/Dockerfile
          push: false
          tags: enterprisecms:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
